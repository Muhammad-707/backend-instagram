services:
  postgres:
    image: postgres:16-alpine
    container_name: ig_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ig}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ig_password}
      POSTGRES_DB: ${POSTGRES_DB:-instagram}
    ports:
      # 5432 на хосте занят локальной установкой PostgreSQL — публикуем на 5433.
      - '${POSTGRES_HOST_PORT:-5433}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ig} -d ${POSTGRES_DB:-instagram}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ig_redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: ig_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 10

  # SMTP только для dev: письма никуда не уходят, читаются в веб-морде на :8025.
  # В prod SMTP_* в .env переключаются на Gmail (smtp.gmail.com:587, App Password) — код не меняется.
  mailhog:
    image: mailhog/mailhog:latest
    container_name: ig_mailhog
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # web UI

  livekit:
    image: livekit/livekit-server:latest
    container_name: ig_livekit
    restart: unless-stopped
    command: --dev --bind 0.0.0.0
    environment:
      LIVEKIT_KEYS: '${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-devsecret}'
    ports:
      - '7880:7880'
      - '7881:7881'
      - '7882:7882/udp'

  # TURN-сервер для звонков 1-на-1 (WebRTC p2p).
  #
  # Зачем он вообще: STUN лишь подсказывает абоненту его внешний адрес. Если оба
  # за симметричным NAT (обычный мобильный интернет), прямой канал не построится
  # ни при каком STUN — трафик должен кто-то ретранслировать, и это TURN.
  # Без него звонок «работает на Wi-Fi и не работает с телефона» — самый
  # неприятный класс багов: воспроизводится не у всех и не всегда.
  #
  # Эфиры (Live) идут через LiveKit — там свой ретранслятор (SFU), TURN не нужен.
  coturn:
    image: coturn/coturn:4.6-alpine
    container_name: ig_coturn
    restart: unless-stopped
    # --lt-cred-mech — длительные учётки (username/password), их же отдаёт
    # GET /chats/calls/ice-servers. --fingerprint обязателен для WebRTC.
    command: >
      -n --log-file=stdout
      --lt-cred-mech --fingerprint
      --realm=${TURN_REALM:-instagram.local}
      --user=${TURN_USERNAME:-igturn}:${TURN_PASSWORD:-igturnpass}
      --listening-port=3478
      --min-port=49160 --max-port=49200
      --no-tls --no-dtls
      --external-ip=${TURN_EXTERNAL_IP:-$$(detect-external-ip)}
    ports:
      - '3478:3478'
      - '3478:3478/udp'
      # Диапазон релеев узкий намеренно: каждый порт публикуется отдельно, а
      # дефолтные 49152–65535 подняли бы 16 тысяч правил и docker бы задохнулся.
      - '49160-49200:49160-49200/udp'

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ig_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ig}:${POSTGRES_PASSWORD:-ig_password}@postgres:5432/${POSTGRES_DB:-instagram}?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: minio
      S3_PORT: '9000'
      LIVEKIT_URL: ws://livekit:7880
      # внутри docker-сети SMTP-хост — имя сервиса, а не localhost
      SMTP_HOST: mailhog
      SMTP_PORT: '1025'
    ports:
      - '${PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      livekit:
        condition: service_started
      mailhog:
        condition: service_started

volumes:
  pgdata:
  redisdata:
  miniodata:
